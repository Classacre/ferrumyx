<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat — Ferrumyx</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css?v=1.0.3">
    <style>
        .chat-shell {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 10rem);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 420px;
        }

        .chat-message {
            max-width: min(860px, 86%);
            padding: 12px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.92rem;
            box-shadow: 0 6px 20px rgba(7, 11, 22, 0.35);
        }

        .message-user {
            align-self: flex-end;
            background: rgba(99, 173, 255, 0.16);
            border: 1px solid rgba(99, 173, 255, 0.35);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message-agent {
            align-self: flex-start;
            background: rgba(18, 25, 38, 0.85);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 14px;
            border-top: 1px solid var(--border-color);
            background: rgba(17, 24, 37, 0.65);
        }

        .chat-input {
            flex: 1;
            background: rgba(12, 17, 28, 0.88);
            border: 1px solid rgba(122, 144, 179, 0.34);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            min-height: 48px;
            max-height: 140px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            border-color: rgba(110, 168, 255, 0.8);
        }

        .typing-indicator {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        @media (max-width: 860px) {
            .chat-message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    {NAV_HTML}

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z" />
                    </svg>
                    IronClaw Agent Chat
                </h1>
                <p class="text-muted">Autonomous conversational interface connected to Ferrumyx backend services.</p>
            </div>
        </div>

        <section class="card chat-shell">
            <div class="card-header border-bottom">
                <div>Live Session</div>
            </div>
            <div class="chat-history" id="chatHistory">
                <div class="chat-message message-agent">
                    <div class="typing-indicator">Ferrumyx Agent</div>
                    <div>Ready. Ask me to run ingestion jobs, inspect targets, or summarize current state.</div>
                </div>
            </div>
            <div class="chat-input-area">
                <textarea id="chatInput" class="chat-input" placeholder="Type a request and press Enter..."></textarea>
                <button id="sendBtn" class="btn btn-primary" type="button">Send</button>
            </div>
        </section>
    </main>

    <script>
        const chatInput = document.getElementById('chatInput');
        const chatHistory = document.getElementById('chatHistory');
        const sendBtn = document.getElementById('sendBtn');
        let currentThreadId = null;

        function appendMessage(role, htmlContent, id = null) {
            const div = document.createElement('div');
            div.className = 'chat-message message-' + role;
            if (id) div.id = id;

            const label = role === 'agent' ? 'Ferrumyx Agent' : 'You';
            div.innerHTML = `<div class="typing-indicator">${label}</div><div>${htmlContent}</div>`;

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            chatInput.value = '';
            sendBtn.disabled = true;

            const thinkingId = 'thinking-' + Date.now();
            appendMessage('agent', 'Thinking...', thinkingId);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: currentThreadId })
                });
                const data = await res.json();

                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();

                if (data.thread_id) {
                    currentThreadId = data.thread_id;
                }

                if (data.status === 'success' || data.response) {
                    appendMessage('agent', data.response || 'Task processing in background.');
                } else {
                    appendMessage('agent', "<span style='color:var(--danger)'>Error: " + (data.error || 'Unknown error') + '</span>');
                }
            } catch (_) {
                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();
                appendMessage('agent', "<span style='color:var(--danger)'>Network error.</span>");
            }

            sendBtn.disabled = false;
            chatInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
