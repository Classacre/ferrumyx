<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat — Ferrumyx</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css?v=1.0.3">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message-user {
            align-self: flex-end;
            background: rgba(88, 166, 255, 0.15);
            border: 1px solid rgba(88, 166, 255, 0.3);
            color: var(--text-primary);
            border-bottom-right-radius: 2px;
        }

        .message-agent {
            align-self: flex-start;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .chat-input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 10px 14px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            height: 48px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent-blue);
        }

        .send-btn {
            background: var(--accent-blue);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    {NAV_HTML}

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Agent Chat</h1>
                <p class="text-muted">Autonomous NL interface for Ferrumyx discovery workflows.</p>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-history" id="chatHistory">
                <div class="chat-message message-agent">
                    <div class="typing-indicator">Ferrumyx Agent</div>
                    <div>Hello! I'm synchronized with the local discovery backend. How can I help you today?</div>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea class="chat-input" id="chatInput"
                    placeholder="Ask about targets, molecules, or knowledge extraction..."
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <script>
        const chatInput = document.getElementById('chatInput');
        const chatHistory = document.getElementById('chatHistory');
        const sendBtn = document.getElementById('sendBtn');
        let currentThreadId = null;

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            chatInput.value = '';
            sendBtn.disabled = true;

            const thinkingId = 'thinking-' + Date.now();
            appendMessage('agent', 'Thinking...', thinkingId);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: currentThreadId })
                });
                const data = await res.json();

                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();

                if (data.thread_id) {
                    currentThreadId = data.thread_id;
                }

                if (data.status === 'success' || data.response) {
                    appendMessage('agent', data.response || "Task processing in background.");
                } else {
                    appendMessage('agent', "<span style='color:var(--accent-red)'>Error: " + (data.error || "Unknown error") + "</span>");
                }
            } catch (err) {
                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();
                appendMessage('agent', "<span style='color:var(--accent-red)'>Network error.</span>");
            }
            sendBtn.disabled = false;
            chatInput.focus();
        }

        function appendMessage(role, htmlContent, id = null) {
            const div = document.createElement('div');
            div.className = 'chat-message message-' + role;
            if (id) div.id = id;

            const label = role === 'agent' ? 'Ferrumyx Agent' : 'You';
            div.innerHTML = `<div class="typing-indicator">${label}</div><div>${htmlContent}</div>`;

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>

</html>
