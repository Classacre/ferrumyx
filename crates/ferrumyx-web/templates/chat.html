<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat — Ferrumyx</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css?v=1.0.3">
    <style>
        .chat-shell {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 10rem);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 420px;
        }

        .chat-message {
            max-width: min(860px, 86%);
            padding: 12px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.92rem;
            box-shadow: 0 6px 20px rgba(7, 11, 22, 0.35);
        }

        .chat-message-body > :first-child {
            margin-top: 0;
        }

        .chat-message-body > :last-child {
            margin-bottom: 0;
        }

        .chat-message-body h1,
        .chat-message-body h2,
        .chat-message-body h3 {
            margin: 0.45rem 0 0.35rem;
            line-height: 1.25;
        }

        .chat-message-body p,
        .chat-message-body ul,
        .chat-message-body ol,
        .chat-message-body pre,
        .chat-message-body blockquote {
            margin: 0.35rem 0;
        }

        .chat-message-body code {
            font-family: "JetBrains Mono", "Consolas", monospace;
            font-size: 0.85em;
            background: rgba(129, 161, 205, 0.18);
            border-radius: 5px;
            padding: 0.12rem 0.3rem;
        }

        .chat-message-body pre {
            background: rgba(9, 14, 23, 0.88);
            border: 1px solid rgba(118, 138, 168, 0.35);
            border-radius: 8px;
            padding: 0.65rem 0.75rem;
            overflow-x: auto;
        }

        .chat-message-body pre code {
            background: transparent;
            border-radius: 0;
            padding: 0;
        }

        .chat-message-body a {
            color: #7eb9ff;
            text-decoration: underline;
        }

        .message-user {
            align-self: flex-end;
            background: rgba(99, 173, 255, 0.16);
            border: 1px solid rgba(99, 173, 255, 0.35);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message-agent {
            align-self: flex-start;
            background: rgba(18, 25, 38, 0.85);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 14px;
            border-top: 1px solid var(--border-color);
            background: rgba(17, 24, 37, 0.65);
        }

        .chat-input {
            flex: 1;
            background: rgba(12, 17, 28, 0.88);
            border: 1px solid rgba(122, 144, 179, 0.34);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            min-height: 48px;
            max-height: 140px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            border-color: rgba(110, 168, 255, 0.8);
        }

        .typing-indicator {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        @media (max-width: 860px) {
            .chat-message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    {NAV_HTML}

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z" />
                    </svg>
                    IronClaw Agent Chat
                </h1>
                <p class="text-muted">Autonomous conversational interface connected to Ferrumyx backend services.</p>
            </div>
        </div>

        <section class="card chat-shell">
            <div class="card-header border-bottom">
                <div>Live Session</div>
            </div>
            <div class="chat-history" id="chatHistory">
                <div class="chat-message message-agent">
                    <div class="typing-indicator">Ferrumyx Agent</div>
                    <div>Ready. Ask me to run ingestion jobs, inspect targets, or summarize current state.</div>
                </div>
            </div>
            <div class="chat-input-area">
                <textarea id="chatInput" class="chat-input" placeholder="Type a request and press Enter..."></textarea>
                <button id="sendBtn" class="btn btn-primary" type="button">Send</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        const chatInput = document.getElementById('chatInput');
        const chatHistory = document.getElementById('chatHistory');
        const sendBtn = document.getElementById('sendBtn');
        let currentThreadId = null;
        let chatEventSource = null;
        let activeReply = null;

        if (window.marked && window.marked.setOptions) {
            window.marked.setOptions({
                breaks: true,
                gfm: true
            });
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderMarkdown(text) {
            const source = String(text || '');
            const parsed = (window.marked && window.marked.parse)
                ? window.marked.parse(source)
                : `<p>${escapeHtml(source).replace(/\n/g, '<br>')}</p>`;
            if (window.DOMPurify && window.DOMPurify.sanitize) {
                return window.DOMPurify.sanitize(parsed);
            }
            return parsed;
        }

        function appendMessage(role, content, options = {}) {
            const div = document.createElement('div');
            div.className = 'chat-message message-' + role;
            if (options.id) div.id = options.id;

            const label = role === 'agent' ? 'Ferrumyx Agent' : 'You';
            const body = document.createElement('div');
            body.className = 'chat-message-body';
            if (options.markdown && role === 'agent') {
                body.innerHTML = renderMarkdown(content);
            } else if (options.rawHtml) {
                body.innerHTML = content;
            } else {
                body.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
            }

            div.innerHTML = `<div class="typing-indicator">${label}</div>`;
            div.appendChild(body);

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return { container: div, body };
        }

        function setMessageContent(messageEl, text, { markdown = false, rawHtml = false } = {}) {
            if (!messageEl) return;
            if (markdown) {
                messageEl.innerHTML = renderMarkdown(text);
            } else if (rawHtml) {
                messageEl.innerHTML = text;
            } else {
                messageEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
            }
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function animateAgentText(messageEl, text, done) {
            const full = String(text || '');
            const total = full.length;
            if (!total) {
                setMessageContent(messageEl, '');
                if (done) done();
                return;
            }
            let idx = 0;
            const step = Math.max(2, Math.floor(total / 70));
            const tick = () => {
                idx = Math.min(total, idx + step);
                setMessageContent(messageEl, full.slice(0, idx), { markdown: true });
                if (idx < total) {
                    requestAnimationFrame(tick);
                } else if (done) {
                    done();
                }
            };
            requestAnimationFrame(tick);
        }

        function startEventStream() {
            if (chatEventSource) return;
            chatEventSource = new EventSource('/api/chat/events');

            const parseEventPayload = (evt) => {
                if (!evt || !evt.data) return null;
                try {
                    return JSON.parse(evt.data);
                } catch (_) {
                    return null;
                }
            };

            const shouldHandle = (payload) => {
                if (!activeReply) return false;
                if (!payload) return false;
                if (!payload.thread_id || !activeReply.threadId) return true;
                return payload.thread_id === activeReply.threadId;
            };

            const onStreamChunk = (evt) => {
                const payload = parseEventPayload(evt);
                if (!shouldHandle(payload) || !payload.content) return;
                activeReply.buffer += String(payload.content);
                setMessageContent(activeReply.bodyEl, activeReply.buffer, { markdown: true });
                activeReply.lastEventAt = Date.now();
            };

            const onResponse = (evt) => {
                const payload = parseEventPayload(evt);
                if (!shouldHandle(payload)) return;
                const finalText = String(payload.content || activeReply.buffer || '');
                const hadChunks = activeReply.buffer && activeReply.buffer.length > 0;
                activeReply.buffer = finalText;
                if (hadChunks) {
                    setMessageContent(activeReply.bodyEl, finalText, { markdown: true });
                    activeReply.done = true;
                    sendBtn.disabled = false;
                } else {
                    animateAgentText(activeReply.bodyEl, finalText, () => {
                        if (activeReply) activeReply.done = true;
                        sendBtn.disabled = false;
                    });
                }
            };

            const onErrorEvent = (evt) => {
                const payload = parseEventPayload(evt);
                if (!shouldHandle(payload)) return;
                const msg = payload && payload.message ? payload.message : 'Agent stream error.';
                setMessageContent(activeReply.bodyEl, `Agent failed: ${msg}`, { markdown: false });
                activeReply.done = true;
                sendBtn.disabled = false;
            };

            chatEventSource.addEventListener('stream_chunk', onStreamChunk);
            chatEventSource.addEventListener('response', onResponse);
            chatEventSource.addEventListener('error', onErrorEvent);
            chatEventSource.onerror = () => {
                if (chatEventSource) {
                    chatEventSource.close();
                    chatEventSource = null;
                }
                setTimeout(startEventStream, 1200);
            };
        }

        async function waitForReply(threadId, userText, timeoutMs = 180000) {
            const deadline = Date.now() + timeoutMs;
            while (Date.now() < deadline) {
                try {
                    const res = await fetch('/api/chat/history?thread_id=' + encodeURIComponent(threadId) + '&limit=50');
                    if (res.ok) {
                        const data = await res.json();
                        const turns = Array.isArray(data.turns) ? data.turns : [];
                        for (let i = turns.length - 1; i >= 0; i--) {
                            const turn = turns[i];
                            if (!turn || turn.user_input !== userText) continue;
                            if (turn.response && turn.response.trim()) {
                                return { ok: true, text: turn.response };
                            }
                            if (turn.error && String(turn.error).trim().length > 0) {
                                return { ok: false, text: `Agent failed: ${turn.error}` };
                            }
                            if (Array.isArray(turn.tool_calls) && turn.tool_calls.length > 0) {
                                const lastErr = turn.tool_calls.find(t => t && t.has_error && t.error);
                                if (lastErr && lastErr.error) {
                                    if (turn.state === 'Processing') {
                                        return { ok: false, text: `Agent hit a tool error while processing: ${lastErr.error}` };
                                    }
                                    return { ok: false, text: `No assistant output returned (state: ${turn.state || 'unknown'}). ${lastErr.error}` };
                                }
                            }
                            if (turn.state && turn.state !== 'Processing') {
                                return { ok: false, text: `No assistant output returned (state: ${turn.state}).` };
                            }
                        }
                    }
                } catch (_) {}
                await new Promise(resolve => setTimeout(resolve, 1500));
            }
            return { ok: false, text: null };
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            startEventStream();
            appendMessage('user', text);
            chatInput.value = '';
            sendBtn.disabled = true;

            const thinkingId = 'thinking-' + Date.now();
            const agentMessage = appendMessage('agent', 'Thinking...', { id: thinkingId, markdown: false });
            activeReply = {
                threadId: currentThreadId,
                userText: text,
                bodyEl: agentMessage.body,
                buffer: '',
                done: false,
                lastEventAt: Date.now()
            };

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: currentThreadId })
                });
                const data = await res.json();

                if (data.thread_id) {
                    currentThreadId = data.thread_id;
                    if (activeReply) activeReply.threadId = data.thread_id;
                }

                if (data.status === 'success') {
                    const txt = data.response || 'Task processing in background.';
                    if (activeReply) {
                        setMessageContent(activeReply.bodyEl, txt, { markdown: true });
                        activeReply.done = true;
                    }
                    sendBtn.disabled = false;
                } else if (data.status === 'accepted' && data.thread_id) {
                    // Fallback path in case streaming events are delayed or unavailable.
                    const snapshot = activeReply;
                    setTimeout(async () => {
                        if (!snapshot || snapshot.done) return;
                        const idleMs = Date.now() - snapshot.lastEventAt;
                        if (idleMs < 12000) return;
                        const reply = await waitForReply(data.thread_id, text);
                        if (!snapshot.done && reply.text) {
                            setMessageContent(snapshot.bodyEl, reply.text, { markdown: !!reply.ok });
                            snapshot.done = true;
                            sendBtn.disabled = false;
                        }
                    }, 15000);
                } else if (data.response) {
                    if (activeReply) {
                        setMessageContent(activeReply.bodyEl, data.response, { markdown: true });
                        activeReply.done = true;
                    }
                    sendBtn.disabled = false;
                } else {
                    if (activeReply) {
                        setMessageContent(activeReply.bodyEl, "Error: " + (data.error || 'Unknown error'));
                        activeReply.done = true;
                    }
                    sendBtn.disabled = false;
                }
            } catch (_) {
                if (activeReply) {
                    setMessageContent(activeReply.bodyEl, 'Network error.');
                    activeReply.done = true;
                }
                sendBtn.disabled = false;
            }
            chatInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
