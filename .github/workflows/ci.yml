name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ferrumyx-runtime-core_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache Cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-

    - name: Cache Cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-target-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev libssl-dev pkg-config

    - name: Install npm dependencies
      run: npm ci

     - name: Check formatting (Rust)
       run: cargo fmt --all -- --check

     - name: Check clippy
       run: cargo clippy -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --features postgres,libsql
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferrumyx_test
          REDIS_URL: redis://localhost:6379

      - name: Install cargo-tarpaulin for coverage
        run: cargo install cargo-tarpaulin

      - name: Run tests with coverage
        run: cargo tarpaulin --workspace --features postgres,libsql --out Xml --output-dir coverage-reports
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferrumyx_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage-reports/cobertura.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

     - name: Build release
       run: cargo build --release --features postgres,libsql

    - name: Run lint (JavaScript/TypeScript)
      run: npm run lint || true

    - name: Run build (JavaScript/TypeScript)
      run: npm run build || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit
      working-directory: crates/ferrumyx-runtime-core

    - name: Run security tests
      run: |
        cargo test --workspace --features postgres,libsql -- --ignored --nocapture security_
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferrumyx_test
        REDIS_URL: redis://localhost:6379

    - name: Run Trivy vulnerability scanner (Docker)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        docker build -f Dockerfile.web -t ferrumyx-web:test .
        docker build -f Dockerfile.agent -t ferrumyx-agent:test .

    - name: Test Docker images
      run: |
        docker run --rm ferrumyx-web:test --version || true
        docker run --rm ferrumyx-agent:test --help || true

  performance:
    name: Performance Testing & Regression Detection
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ferrumyx_bench
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for regression analysis

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev postgresql-client

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psutil matplotlib pandas numpy scipy seaborn

    - name: Setup database extensions
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d ferrumyx_bench -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
        PGPASSWORD=postgres psql -h localhost -U postgres -d ferrumyx_bench -c "CREATE EXTENSION IF NOT EXISTS vector;"

    - name: Build Ferrumyx for benchmarking
      run: cargo build --release --features postgres,libsql

    - name: Start Ferrumyx server for testing
      run: |
        cargo run --release --features postgres,libsql --bin ferrumyx-agent &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

        # Wait for server to be ready
        timeout 60 bash -c 'until curl -f http://localhost:3001/api/monitoring/health; do sleep 2; done'

    - name: Run database performance analysis
      run: |
        python database_performance_analyzer.py \
          --connection-string "postgresql://postgres:postgres@localhost:5432/ferrumyx_bench" \
          --ci-mode

    - name: Run performance regression tests
      run: |
        python performance_regression_test.py \
          --url http://localhost:3001 \
          --ci-mode \
          --scenarios api_health literature_search target_discovery kg_query chat_query
      env:
        ENVIRONMENT: ci

    - name: Run Criterion micro-benchmarks
      run: |
        cargo install cargo-criterion
        cargo criterion --features postgres,libsql
      working-directory: crates/ferrumyx-runtime-core
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferrumyx_bench
        REDIS_URL: redis://localhost:6379

    - name: Run custom performance tests
      run: |
        cargo test --workspace --features postgres,libsql -- --ignored --nocapture perf_
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferrumyx_bench
        REDIS_URL: redis://localhost:6379

    - name: Generate performance comparison report
      run: |
        python -c "
        import json
        import os
        from pathlib import Path

        # Check for performance regression results
        perf_db = Path('./performance_db')
        if perf_db.exists():
            # Load latest regression test results
            results_files = list(perf_db.glob('regression_test_*.json'))
            if results_files:
                latest = max(results_files, key=lambda x: x.stat().st_mtime)
                with open(latest, 'r') as f:
                    results = json.load(f)

                print('## Performance Regression Test Results')
                print(f'Result: {\"PASS\" if results[\"overall_success\"] else \"FAIL\"}')
                print(f'Regressions: {results[\"regressed_scenarios\"]} out of {results[\"total_scenarios\"]} scenarios')

                if not results['overall_success']:
                    print('\\n### Regressions Detected:')
                    for scenario, data in results['results'].items():
                        if data['regression_analysis']['regression_detected']:
                            regs = list(data['regression_analysis']['regressed_metrics'].keys())
                            print(f'- {scenario}: {regs}')
        "

    - name: Stop Ferrumyx server
      run: |
        if [ ! -z \"$SERVER_PID\" ]; then
          kill $SERVER_PID || true
        fi
      if: always()

    - name: Store benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results-${{ github.run_id }}
      path: |
        crates/ferrumyx-runtime-core/target/criterion/
        performance_db/
        performance_reports/
        db_performance_reports/
        perf-results.json

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Compose
      run: |
        docker-compose -f docker-compose.dev.yml up -d --build
        docker-compose -f docker-compose.dev.yml ps

    - name: Wait for services
      run: |
        timeout 300 bash -c 'until curl -f http://localhost:3000/health; do sleep 5; done'

    - name: Run Rust E2E tests
      run: |
        cargo test --workspace --features postgres,libsql -- --ignored --nocapture e2e_
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferrumyx_test
        REDIS_URL: redis://localhost:6379
        FERRUMYX_WEB_URL: http://localhost:3000

    - name: Run JavaScript E2E tests
      run: |
        if [ -d "tests/e2e" ]; then
          cd tests/e2e && npm install && npm test
        else
          echo "No JavaScript E2E tests found"
        fi

    - name: Collect logs on failure
      if: failure()
      run: |
        docker-compose -f docker-compose.dev.yml logs > e2e-logs.txt
        docker-compose -f docker-compose.dev.yml down

    - name: Upload logs
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: e2e-failure-logs
        path: e2e-logs.txt