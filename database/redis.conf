# Redis configuration for Ferrumyx - Security hardened
# Network
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 300

# Security
# Require authentication
requirepass ${REDIS_PASSWORD}

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN SHUTDOWN_RENAMED
rename-command CONFIG CONFIG_RENAMED
rename-command DEBUG DEBUG_RENAMED

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /data/redis.log

# Persistence
save 900 1
save 300 10
save 60 10000

# Disable AOF for performance, enable RDB
appendonly no

# Disable protected mode in production (we bind to 0.0.0.0)
protected-mode no

# Limits
maxclients 1000
tcp-backlog 511

# Disable Lua scripting for security
lua-time-limit 5000

# Disable pub/sub in favor of streams
# (keep enabled for now)

# Set umask for file permissions
# umask 077