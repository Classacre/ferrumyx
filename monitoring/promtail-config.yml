server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log
    pipeline_stages:
      - match:
          selector: '{job="varlogs"}'
          stages:
            - multiline:
                firstline: '^\w{3} \d{2} \d{2}:\d{2}:\d{2}'
            - regex:
                expression: '^(?P<timestamp>\w{3} \d{2} \d{2}:\d{2}:\d{2}) (?P<hostname>\w+) (?P<program>\w+)\[(?P<pid>\d+)\]: (?P<message>.*)$'
            - labels:
                timestamp:
                hostname:
                program:
                pid:

  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{job="docker"}'
          stages:
            - regex:
                expression: '^{"log":"(?P<log>.*)","stream":"(?P<stream>.*)","time":"(?P<time>.*)"}'
            - labels:
                stream:
            - timestamp:
                format: RFC3339Nano
                source: time
            - output:
                source: log

  - job_name: ferrumyx-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: ferrumyx-app
          service: web
          __path__: /var/log/ferrumyx/*.log
    pipeline_stages:
      - match:
          selector: '{job="ferrumyx-app"}'
          stages:
            - json:
                expressions:
                  level: level
                  message: message
                  timestamp: timestamp
            - labels:
                level:
            - timestamp:
                format: RFC3339
                source: timestamp