global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@ferrumyx.com'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email-alerts'
  routes:
  - match:
      severity: critical
    receiver: 'email-alerts'
    group_wait: 5s

receivers:
- name: 'email-alerts'
  email_configs:
  - to: 'admin@ferrumyx.com'
    send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']