version: "3.8"

services:
  # Production overrides with secrets and resource limits
  ferrumyx-web:
    secrets:
      - db_password
      - redis_password
      - api_keys
    environment:
      - FERRUMYX_DATABASE_URL=postgresql://ferrumyx:${DB_PASSWORD}@postgres:5432/ferrumyx
      - FERRUMYX_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DB_PASSWORD_FILE=/run/config/db_password
      - REDIS_PASSWORD_FILE=/run/config/redis_password
      - API_KEYS_FILE=/run/config/api_keys
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  ironclaw-agent:
    secrets:
      - api_keys
    environment:
      - API_KEYS_FILE=/run/config/api_keys
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  postgres:
    secrets:
      - db_password
    environment:
      - POSTGRES_PASSWORD_FILE=/run/config/db_password
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  redis:
    secrets:
      - redis_password
    command: redis-server --requirepassfile /run/config/redis_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  nginx:
    secrets:
      - ssl_cert
      - ssl_key
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  bioclaw-wasm:
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  gateway-service:
    secrets:
      - api_keys
      - webhook_secret
    environment:
      - WEBHOOK_SECRET_FILE=/run/config/webhook_secret
      - API_KEYS_FILE=/run/config/api_keys
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  prometheus:
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  grafana:
    secrets:
      - grafana_admin_password
    environment:
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/config/grafana_admin_password
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  alertmanager:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  node-exporter:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

secrets:
  db_password:
    file: ./config/db_password.txt
    target: /run/config/db_password
  redis_password:
    file: ./config/redis_password.txt
    target: /run/config/redis_password
  api_keys:
    file: ./config/api_keys.json
    target: /run/config/api_keys
  webhook_secret:
    file: ./config/webhook_secret.txt
    target: /run/config/webhook_secret
  ssl_cert:
    file: ./config/ssl_cert.pem
    target: /run/config/ssl_cert
  ssl_key:
    file: ./config/ssl_key.pem
    target: /run/config/ssl_key
  grafana_admin_password:
    file: ./config/grafana_admin_password.txt
    target: /run/config/grafana_admin_password