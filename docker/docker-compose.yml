version: '3.8'

services:
  blast:
    build:
      context: .
      dockerfile: Dockerfile.blast
    container_name: ferrumyx-blast
    volumes:
      - ./data:/workspace/data:ro
      - ./output:/workspace/output:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  pymol:
    build:
      context: .
      dockerfile: Dockerfile.pymol
    container_name: ferrumyx-pymol
    volumes:
      - ./data:/workspace/data:ro
      - ./output:/workspace/output:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  fastqc:
